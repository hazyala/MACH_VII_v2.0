name: MACH_VII_v2.0
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # --- [기본 수치 연산 및 시뮬레이션] ---
  - numpy=1.26.4
  - scipy
  - pybullet
  
  - pip:
      # --- [Interface: 백엔드 및 통신] ---
      - fastapi
      - uvicorn[standard]
      - websockets
      - python-socketio
      - python-dotenv
      
      # --- [Brain: 에이전트 및 로직] ---
      - langchain
      - langchain-community
      - langchain-core
      - requests
      
      # --- [Core: 비전 및 하드웨어] ---
      - opencv-python
      - ultralytics>=8.3.0
      - pyrealsense2
      - Pillow
      
      # --- [Memory: 데이터베이스] ---
      - falkordb
      
      # --- [Frontend Build (Node.js required separately)] ---
      # Node.js 패키지는 interface/frontend/package.json 참조